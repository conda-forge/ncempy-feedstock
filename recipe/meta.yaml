{% set name = "ncempy" %}
{% set version = "1.15" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5ba9463ce5b5754c93990cd95c28eaf0345d17f3a73db3be54d0a73ee768c66d

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python
  entry_points:
    - ncem2png = ncempy.command_line.ncem2png:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - matplotlib-base
    - h5py
    - setuptools

test:
  requires:
    - python {{ python_min }}
  imports:
    - ncempy
  commands:
    - ncem2png --help

about:
  home: https://github.com/ercius/openNCEM
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: A collection of packages and tools for electron microscopy data analysis supported by the National Center for Electron Microscopy facility of the Molecular Foundry
  doc_url: https://openncem.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - tschoonj
